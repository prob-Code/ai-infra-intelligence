services:

  postgres:
    image: postgres:16
    container_name: ai-postgres
    environment:
      POSTGRES_DB: infra_ai
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data                                                                                

  redis:
    image: redis:7
    container_name: ai-redis
    ports:
      - "6379:6379"

  fastapi:
    build:
      context: ./backend
    container_name: ai-fastapi

    env_file:
      - .env

    ports:
      - "8000:8000"

    depends_on:
      - postgres
      - redis
      - prometheus

  prometheus:
    image: prom/prometheus:latest
    container_name: ai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: ai-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  neo4j:
    image: neo4j:5
    container_name: ai-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password123

  n8n:
    image: n8nio/n8n
    container_name: ai-n8n

    ports:
      - "5678:5678"

    environment:
      - N8N_SECURE_COOKIE=false
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http

  node-exporter:
    image: prom/node-exporter:latest
    container_name: ai-node-exporter

    command:
      - '--path.rootfs=/host'

    pid: host

    volumes:
      - '/:/host:ro,rslave'

    ports:
      - "9100:9100"
volumes:
  postgres_data:
  grafana_data:
